services:
  postgres:
    image: postgres:16-alpine
    container_name: gymcheck-postgres
    environment:
      POSTGRES_DB: gymcheck
      POSTGRES_USER: gymcheck
      POSTGRES_PASSWORD: gymcheck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymcheck -d gymcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
