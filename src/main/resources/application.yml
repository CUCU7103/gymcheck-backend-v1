spring:
  application:
    name: gymcheck-api
  config:
    import: optional:file:.env[.properties]
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
  datasource:
    url: jdbc:postgresql://localhost:5432/gymcheck
    username: ${DB_USERNAME:gymcheck}
    password: ${DB_PASSWORD:gymcheck}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

server:
  port: 8080

logging:
  level:
    com.gymcheck: DEBUG
    org.springframework.security: INFO

jwt:
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
  project-id: ${FIREBASE_PROJECT_ID:}

springdoc:
  swagger-ui:
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
